<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fale com a gente</title>
  <script src="https://www.google.com/recaptcha/api.js"></script>
  <script>
    function timestamp() {
      var response = document.getElementById("g-recaptcha-response");
      if (response == null || response.value.trim() == "") {
        var elems = JSON.parse(document.getElementsByName("captcha_settings")[0].value);
        elems["ts"] = JSON.stringify(new Date().getTime());
        document.getElementsByName("captcha_settings")[0].value = JSON.stringify(elems);
      }
    }
    setInterval(timestamp, 500);
  </script>

  <style>
    :root {
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --ring: rgba(37, 99, 235, .15);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 100% -10%, #dbeafe 0%, transparent 55%),
        radial-gradient(900px 500px at -10% 110%, #ede9fe 0%, transparent 50%),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 10px 40px -12px rgba(15, 23, 42, .18);
      overflow: hidden;
    }

    .card__head {
      padding: 32px 32px 24px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #fafbff, #ffffff);
    }

    /* ---- Logo do cliente ---- */
    .logo-zone {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .logo-box {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      border: 2px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #f8fafc;
      transition: border-color .15s, background .15s;
      position: relative;
    }
    .logo-zone:hover .logo-box { border-color: var(--brand); background: #f0f6ff; }
    .logo-box img { width: 100%; height: 100%; object-fit: contain; }
    .logo-box .placeholder {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.3;
      padding: 0 8px;
    }
    .logo-box .placeholder svg { display: block; margin: 0 auto 4px; opacity: .6; }
    .logo-hint { font-size: 12px; color: var(--muted); }
    .logo-actions { margin-top: 6px; }
    .logo-actions button {
      background: none;
      border: none;
      color: var(--brand);
      font-size: 12px;
      cursor: pointer;
      padding: 0;
    }
    .logo-actions button:hover { text-decoration: underline; }

    .card__head h1 {
      margin: 18px 0 4px;
      font-size: 22px;
      font-weight: 700;
    }
    .card__head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    form { padding: 28px 32px 32px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    input[type="text"],
    input[type="email"],
    select {
      width: 100%;
      padding: 11px 13px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }
    input:focus, select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px var(--ring);
    }

    .g-recaptcha { margin: 20px 0 8px; display: flex; justify-content: center; }

    button[type="submit"] {
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: var(--brand);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s, transform .05s;
    }
    button[type="submit"]:hover { background: var(--brand-dark); }
    button[type="submit"]:active { transform: translateY(1px); }

    .footnote {
      margin-top: 16px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
      .card__head, form { padding-left: 22px; padding-right: 22px; }
    }
  </style>
</head>

  <script>
    // ---- Upload de logo (fica só no navegador deste computador) ----
    (function () {
      var KEY = "demo_client_logo";
      var zone = document.getElementById("logoZone");
      var input = document.getElementById("logoInput");
      var box = document.getElementById("logoBox");
      var placeholder = document.getElementById("logoPlaceholder");
      var actions = document.getElementById("logoActions");
      var removeBtn = document.getElementById("logoRemove");

      function render(dataUrl) {
        if (dataUrl) {
          box.innerHTML = '<img src="' + dataUrl + '" alt="Logo">';
          actions.style.display = "block";
        } else {
          box.innerHTML = "";
          box.appendChild(placeholder);
          actions.style.display = "none";
        }
      }

      // Restaura a logo salva neste PC, se houver
      try {
        var saved = localStorage.getItem(KEY);
        if (saved) render(saved);
      } catch (e) {}

      zone.addEventListener("click", function () { input.click(); });

      input.addEventListener("change", function () {
        var file = input.files && input.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function (ev) {
          var dataUrl = ev.target.result;
          render(dataUrl);
          try { localStorage.setItem(KEY, dataUrl); } catch (e) {}
        };
        reader.readAsDataURL(file);
      });

      removeBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        try { localStorage.removeItem(KEY); } catch (e) {}
        render(null);
        input.value = "";
      });
    })();
  </script>
